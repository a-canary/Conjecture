# Gitleaks configuration for Conjecture
# https://github.com/gitleaks/gitleaks

[allowlist]
description = "Allowlist rules for Conjecture"
files = [
  "(^|/)tests?/",
  ".env.example$",
  ".env.test$",
  "(^|/)blog/",
  "(^|/)docs/",
]

# Entropy-based rules (secrets typically have high entropy)
[[rules]]
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret|api[_-]?token)\s*[:=]\s*['\"]?[\w\-]{20,}['\"]?'''

[[rules]]
description = "OpenAI API Key"
regex = '''sk-[a-zA-Z0-9]{48,}'''

[[rules]]
description = "Google AI API Key"
regex = '''AIza[a-zA-Z0-9_-]{35,}'''

[[rules]]
description = "Anthropic API Key"
regex = '''sk-ant-[a-zA-Z0-9_-]{50,}'''

[[rules]]
description = "GitHub Token"
regex = '''ghp_[a-zA-Z0-9]{36,}'''

[[rules]]
description = "Generic Secret"
regex = '''(?i)(password|passwd|pwd|secret|token)\s*[:=]\s*['\"]?[a-zA-Z0-9_!@#$%^&*()\-+=\[\]{}|;:'",.<>?/\\]{8,}['\"]?'''